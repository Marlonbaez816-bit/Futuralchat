<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Futuralchat - Verificado</title>
    
    <!-- SDKs de Firebase (Carga necesaria para Auth y Persistencia) -->
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>

    <style>
        /* ESTILO IPDROP (GLASSMORPHISM) OPTIMIZADO PARA MÓVIL */
        :root {
            --glass: rgba(255, 255, 255, 0.12);
            --border: rgba(255, 255, 255, 0.2);
            --accent: #4ecca3;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(circle at top right, #1b262c, #0f172a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 25px;
            width: 85%;
            max-width: 350px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        /* CARTELITO VERIFICADO */
        .verified-badge {
            background: #0084ff;
            color: white;
            font-size: 10px;
            font-weight: 800;
            padding: 5px 15px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 15px;
            box-shadow: 0 4px 12px rgba(0, 132, 255, 0.4);
            text-transform: uppercase;
        }

        /* PESTAÑAS DE ACCESO */
        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            margin-bottom: 20px;
            padding: 4px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: #94a3b8;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
        }

        .tab-btn.active {
            background: var(--accent);
            color: #0f172a;
        }

        /* INPUTS Y BOTONES TÁCTILES */
        input {
            width: 100%;
            box-sizing: border-box;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            padding: 14px;
            margin: 8px 0;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        button.main-action {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: #0f172a;
            border: none;
            border-radius: 14px;
            font-weight: bold;
            font-size: 16px;
            margin-top: 15px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(78, 204, 163, 0.3);
        }

        /* PERFIL */
        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 4px solid var(--accent);
            object-fit: cover;
            margin-bottom: 12px;
        }

        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="verified-badge">✓ Verificado</div>

        <!-- SECCIÓN LOGIN / REGISTRO -->
        <div id="section-auth">
            <div class="tabs">
                <button id="t-login" class="tab-btn active" onclick="switchTab('login')">Entrar</button>
                <button id="t-reg" class="tab-btn" onclick="onclick=switchTab('reg')">Registro</button>
            </div>

            <div id="form-login">
                <input type="email" id="l-email" placeholder="Correo electrónico">
                <input type="password" id="l-pass" placeholder="Contraseña">
                <button class="main-action" onclick="login()">Iniciar Sesión</button>
            </div>

            <div id="form-reg" class="hidden">
                <input type="text" id="r-name" placeholder="Nombre completo">
                <input type="text" id="r-photo" placeholder="Link de foto (Avatar)">
                <input type="email" id="r-email" placeholder="Correo">
                <input type="password" id="r-pass" placeholder="Contraseña">
                <button class="main-action" onclick="register()">Crear Cuenta</button>
            </div>
        </div>

        <!-- SECCIÓN USUARIO LOGUEADO -->
        <div id="section-user" class="hidden">
            <img id="u-avatar" src="" class="avatar">
            <h3 id="u-name" style="margin: 5px 0;"></h3>
            <p style="font-size: 12px; color: #4ecca3; margin-bottom: 20px;">Sesión Persistente Activa</p>
            <button class="main-action" style="background: #ef4444; color: white;" onclick="logout()">Cerrar Sesión</button>
        </div>
    </div>

    <script>
        // VARIABLE GLOBAL DE AUTENTICACIÓN
        let auth;

        // INICIALIZACIÓN CUANDO LA PÁGINA ESTÁ LISTA (IMPORTANTE PARA TELÉFONOS)
        window.onload = function() {
            const firebaseConfig = {
                apiKey: "AIzaSyBVlXapbDchsQog-d79Bv9Tw",
                authDomain: "futuralchat.firebaseapp.com",
                projectId: "futuralchat",
                storageBucket: "futuralchat.firebasestorage.app",
                messagingSenderId: "888367297347",
                appId: "1:888367297347:web:s4abe58b20ec9e11516086"
            };

            // Iniciar Firebase
            firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();

            // PERSISTENCIA: Escucha si el usuario ya estaba logueado
            auth.onAuthStateChanged((user) => {
                const sAuth = document.getElementById('section-auth');
                const sUser = document.getElementById('section-user');

                if (user) {
                    sAuth.classList.add('hidden');
                    sUser.classList.remove('hidden');
                    document.getElementById('u-name').innerText = user.displayName || "Usuario";
                    document.getElementById('u-avatar').src = user.photoURL || "https://cdn-icons-png.flaticon.com";
                } else {
                    sAuth.classList.remove('hidden');
                    sUser.classList.add('hidden');
                }
            });
        };

        // FUNCIONES DE CONTROL
        function switchTab(mode) {
            const isLogin = mode === 'login';
            document.getElementById('form-login').classList.toggle('hidden', !isLogin);
            document.getElementById('form-reg').classList.toggle('hidden', isLogin);
            document.getElementById('t-login').classList.toggle('active', isLogin);
            document.getElementById('t-reg').classList.toggle('active', !isLogin);
        }

        async function register() {
            if(!auth) return;
            const name = document.getElementById('r-name').value;
            const photo = document.getElementById('r-photo').value;
            const email = document.getElementById('r-email').value;
            const pass = document.getElementById('r-pass').value;

            try {
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                await res.user.updateProfile({ displayName: name, photoURL: photo });
                alert("¡Bienvenido a Futuralchat!");
            } catch (err) { alert("Error: " + err.message); }
        }

        function login() {
            if(!auth) return;
            const email = document.getElementById('l-email').value;
            const pass = document.getElementById('l-pass').value;
            auth.signInWithEmailAndPassword(email, pass).catch(err => alert("Error: " + err.message));
        }

        function logout() {
            if(auth) auth.signOut().then(() => alert("Has salido de la sesión."));
        }
    </script>
</body>
</html>
