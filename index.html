<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuralchat P2P | Privacidad Total</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <script src="https://unpkg.com"></script>
    <style>
        :root { --p: #6A0DAD; --lp: #E1BEE7; --bg: #f0f2f5; --w: #ffffff; --g: #54656f; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #d1d7db; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        .app { width: 100%; max-width: 1400px; height: 100vh; background: var(--w); display: flex; }

        /* SIDEBAR */
        .sidebar { width: 30%; min-width: 300px; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sb-header { background: #ededed; padding: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        .my-id-badge { background: var(--p); color: white; padding: 5px 10px; border-radius: 15px; font-size: 12px; font-weight: bold; cursor: pointer; }
        
        .search-area { padding: 10px; background: #fff; }
        .search-box { background: var(--bg); border-radius: 20px; display: flex; align-items: center; padding: 0 15px; }
        .search-box input { border: none; background: transparent; padding: 10px; width: 100%; outline: none; }

        .chat-list { flex: 1; overflow-y: auto; }
        .contact { display: flex; padding: 15px; border-bottom: 1px solid #f2f2f2; cursor: pointer; transition: 0.2s; align-items: center; }
        .contact:hover { background: #f5f5f5; }
        .contact.active { background: #ebebeb; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--p); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 15px; }

        /* CHAT WINDOW */
        .main { flex: 1; display: flex; flex-direction: column; background: #efeae2 url('https://user-images.githubusercontent.com'); }
        .main-header { background: #ededed; padding: 10px 15px; display: flex; align-items: center; border-left: 1px solid #ddd; }
        
        .msg-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        
        /* ANIMACIONES AIRDROP */
        @keyframes air { from { opacity: 0; transform: scale(0.7) translateY(30px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .bubble { max-width: 65%; padding: 8px 12px; border-radius: 10px; font-size: 14.5px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); animation: air 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); position: relative; }
        .sent { align-self: flex-end; background: var(--lp); border-top-right-radius: 0; }
        .received { align-self: flex-start; background: white; border-top-left-radius: 0; }
        .bubble img, .bubble video { width: 100%; border-radius: 8px; margin-top: 5px; }
        .time { font-size: 10px; color: #888; text-align: right; display: block; margin-top: 4px; }

        .footer { background: #f0f2f5; padding: 10px; display: flex; align-items: center; gap: 10px; }
        .footer input { flex: 1; border: none; padding: 12px; border-radius: 20px; outline: none; }
        .btn { color: var(--p); font-size: 22px; cursor: pointer; transition: 0.2s; }
        #empty { position: absolute; inset: 0; background: #f8f9fa; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5; text-align: center; }
    </style>
</head>
<body>

<div class="app">
    <aside class="sidebar">
        <div class="sb-header">
            <div class="my-id-badge" onclick="copyID()" title="Click para copiar">MI ID: <span id="myID">...</span></div>
            <i class="fas fa-circle-notch" style="color:var(--g)"></i>
        </div>
        <div class="search-area">
            <div class="search-box">
                <input type="text" id="targetID" placeholder="Ingresa ID de amigo...">
                <i class="fas fa-plus-circle btn" onclick="startNewChat()"></i>
            </div>
        </div>
        <div class="chat-list" id="contacts"></div>
    </aside>

    <main class="main">
        <div id="empty">
            <i class="fas fa-shield-alt" style="font-size:70px; color:#e9edef; margin-bottom:15px"></i>
            <h2>Futuralchat P2P</h2>
            <p>Conexión directa entre dispositivos.<br>Nada se guarda en la nube.</p>
        </div>
        <header class="main-header" style="display:none" id="mHeader">
            <div class="avatar" id="hAvatar">?</div>
            <div style="flex:1; margin-left:15px">
                <h4 id="hName">Usuario</h4>
                <span style="font-size:12px; color:#25D366" id="hStatus">En línea (P2P)</span>
            </div>
            <i class="fas fa-location-arrow btn" onclick="sendLoc()" title="Enviar ubicación"></i>
        </header>

        <div class="msg-box" id="msgBox"></div>

        <footer class="footer">
            <label for="fileIn"><i class="fas fa-paperclip btn"></i></label>
            <input type="file" id="fileIn" hidden accept="image/*,video/*" onchange="sendMedia(this)">
            <input type="text" id="mInput" placeholder="Escribe un mensaje..." onkeypress="if(event.key==='Enter') sendMsg()">
            <i class="fas fa-paper-plane btn" onclick="sendMsg()"></i>
        </footer>
    </main>
</div>

<script>
    let peer, db, activeConn, currentChat = null;
    const myID = localStorage.getItem('p2p_id') || Math.floor(10000 + Math.random() * 90000);
    localStorage.setItem('p2p_id', myID);
    document.getElementById('myID').innerText = myID;

    // BASE DE DATOS INTERNA (IndexedDB)
    const req = indexedDB.open("P2PChatDB", 1);
    req.onupgradeneeded = e => {
        const d = e.target.result;
        d.createObjectStore("msgs", { keyPath: "id", autoIncrement: true });
        d.createObjectStore("users", { keyPath: "uid" });
    };
    req.onsuccess = e => { db = e.target.result; renderList(); };

    // INICIALIZAR CONEXIÓN P2P
    peer = new Peer(myID);
    peer.on('connection', conn => {
        activeConn = conn;
        setupConn(conn);
        saveUser(conn.peer);
    });

    function setupConn(conn) {
        conn.on('data', data => {
            saveMsg({ chat: conn.peer, ...data, sender: 'other' });
            if(activeChat !== conn.peer) renderList();
        });
    }

    function startNewChat() {
        const id = document.getElementById('targetID').value.trim();
        if(!id || id == myID) return;
        saveUser(id);
        openChat(id);
    }

    function openChat(id) {
        activeChat = id;
        document.getElementById('empty').style.display = 'none';
        document.getElementById('mHeader').style.display = 'flex';
        document.getElementById('hName').innerText = "ID: " + id;
        document.getElementById('hAvatar').innerText = id.toString().substring(0,2);
        activeConn = peer.connect(id);
        setupConn(activeConn);
        loadMsgs();
        renderList();
    }

    function sendMsg() {
        const val = document.getElementById('mInput').value;
        if(!val || !activeChat) return;
        const msg = { type: 'text', content: val };
        if(activeConn) activeConn.send(msg);
        saveMsg({ chat: activeChat, ...msg, sender: 'me' });
        document.getElementById('mInput').value = "";
    }

    function sendMedia(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = e => {
            const msg = { type: file.type.startsWith('image') ? 'img' : 'video', content: e.target.result };
            if(activeConn) activeConn.send(msg);
            saveMsg({ chat: activeChat, ...msg, sender: 'me' });
        };
        reader.readAsDataURL(file);
    }

    function sendLoc() {
        navigator.geolocation.getCurrentPosition(p => {
            const link = `https://www.google.com{p.coords.latitude},${p.coords.longitude}`;
            const msg = { type: 'text', content: "📍 Mi ubicación: " + link };
            if(activeConn) activeConn.send(msg);
            saveMsg({ chat: activeChat, ...msg, sender: 'me' });
        });
    }

    function saveMsg(obj) {
        obj.time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const tx = db.transaction("msgs", "readwrite");
        tx.objectStore("msgs").add(obj);
        tx.oncomplete = loadMsgs;
    }

    function saveUser(uid) {
        const tx = db.transaction("users", "readwrite");
        tx.objectStore("users").put({ uid: uid });
        tx.oncomplete = renderList;
    }

    function loadMsgs() {
        const box = document.getElementById('msgBox');
        box.innerHTML = "";
        db.transaction("msgs").objectStore("msgs").getAll().onsuccess = e => {
            e.target.result.filter(m => m.chat == activeChat).forEach(m => {
                const d = document.createElement('div');
                d.className = `bubble ${m.sender === 'me' ? 'sent' : 'received'}`;
                if(m.type === 'text') d.innerText = m.content;
                else if(m.type === 'img') d.innerHTML = `<img src="${m.content}">`;
                else if(m.type === 'video') d.innerHTML = `<video src="${m.content}" controls></video>`;
                d.innerHTML += `<span class="time">${m.time}</span>`;
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        };
    }

    function renderList() {
        const list = document.getElementById('contacts');
        list.innerHTML = "";
        db.transaction("users").objectStore("users").getAll().onsuccess = e => {
            e.target.result.forEach(u => {
                const d = document.createElement('div');
                d.className = `contact ${activeChat == u.uid ? 'active' : ''}`;
                d.onclick = () => openChat(u.uid);
                d.innerHTML = `<div class="avatar">${u.uid.toString().substring(0,2)}</div><div><h4>ID: ${u.uid}</h4><p>Toca para chatear</p></div>`;
                list.appendChild(d);
            });
        };
    }

    function copyID() {
        navigator.clipboard.writeText(myID);
        alert("Tu ID ha sido copiado: " + myID);
    }
</script>
</body>
</html>
