<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Futuralchat - Verificado</title>
    
    <!-- Scripts de Firebase (Carga Prioritaria) -->
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>

    <style>
        /* ESTILO IPDROP / GLASSMORPHISM */
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
            --accent: #4ecca3;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top right, #1b262c, #0f4c75);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 25px;
            width: 85%;
            max-width: 360px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        /* CARTELITO VERIFICADO */
        .verified-badge {
            background: #007bff;
            color: white;
            font-size: 11px;
            font-weight: 800;
            padding: 5px 15px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
            text-transform: uppercase;
        }

        /* PESTAÑAS DE NAVEGACIÓN */
        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            margin-bottom: 20px;
            padding: 5px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #94a3b8;
            font-weight: bold;
            font-size: 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--accent);
            color: #1b262c;
        }

        /* INPUTS Y BOTONES */
        input {
            width: 100%;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            padding: 15px;
            margin: 10px 0;
            border-radius: 15px;
            color: white;
            font-size: 16px; /* Evita zoom molesto en móvil */
            outline: none;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #1b262c;
            border: none;
            border-radius: 15px;
            font-weight: 800;
            font-size: 16px;
            margin-top: 15px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(78, 204, 163, 0.3);
        }

        /* PERFIL DE USUARIO */
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid var(--accent);
            object-fit: cover;
            margin: 0 auto 15px;
            display: block;
        }

        .hidden { display: none; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="verified-badge">✓ Verificado</div>

        <!-- SECCIÓN LOGIN/REGISTRO -->
        <div id="auth-ui">
            <div class="tabs">
                <button id="btn-tab-login" class="tab-btn active" onclick="showTab('login')">Entrar</button>
                <button id="btn-tab-reg" class="tab-btn" onclick="showTab('reg')">Registrarse</button>
            </div>

            <div id="form-login">
                <input type="email" id="l-email" placeholder="Correo electrónico">
                <input type="password" id="l-pass" placeholder="Contraseña">
                <button class="btn-primary" onclick="handleLogin()">Iniciar Sesión</button>
            </div>

            <div id="form-reg" class="hidden">
                <input type="text" id="r-name" placeholder="Nombre completo">
                <input type="text" id="r-photo" placeholder="URL de tu foto (Avatar)">
                <input type="email" id="r-email" placeholder="Correo">
                <input type="password" id="r-pass" placeholder="Contraseña">
                <button class="btn-primary" onclick="handleRegister()">Crear Cuenta</button>
            </div>
        </div>

        <!-- SECCIÓN PERFIL (SESIÓN ACTIVA) -->
        <div id="user-ui" class="hidden">
            <img id="u-photo" src="" class="profile-img">
            <h2 id="u-name" style="margin: 5px 0;"></h2>
            <p style="font-size: 13px; color: #4ecca3; margin-bottom: 25px;">Cuenta Verificada y Persistente</p>
            <button class="btn-primary" style="background: #ef4444; color: white;" onclick="handleLogout()">Cerrar Sesión</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE FIREBASE (Extraída de tu configuración activa)
        const firebaseConfig = {
            apiKey: "AIzaSyBVlXapbDchsQog-d79Bv9Tw",
            authDomain: "futuralchat.firebaseapp.com",
            projectId: "futuralchat",
            storageBucket: "futuralchat.firebasestorage.app",
            messagingSenderId: "888367297347",
            appId: "1:888367297347:web:s4abe58b20ec9e11516086"
        };

        // Inicialización segura
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // PERSISTENCIA: Controla el estado de la sesión
        auth.onAuthStateChanged((user) => {
            const authUI = document.getElementById('auth-ui');
            const userUI = document.getElementById('user-ui');

            if (user) {
                authUI.classList.add('hidden');
                userUI.classList.remove('hidden');
                document.getElementById('u-name').innerText = user.displayName || "Usuario";
                document.getElementById('u-photo').src = user.photoURL || "https://cdn-icons-png.flaticon.com";
            } else {
                authUI.classList.remove('hidden');
                userUI.classList.add('hidden');
            }
        });

        // FUNCIONES DE NAVEGACIÓN
        function showTab(mode) {
            const isLogin = mode === 'login';
            document.getElementById('form-login').classList.toggle('hidden', !isLogin);
            document.getElementById('form-reg').classList.toggle('hidden', isLogin);
            document.getElementById('btn-tab-login').classList.toggle('active', isLogin);
            document.getElementById('btn-tab-reg').classList.toggle('active', !isLogin);
        }

        // ACCIONES DE FIREBASE
        async function handleRegister() {
            const name = document.getElementById('r-name').value;
            const photo = document.getElementById('r-photo').value;
            const email = document.getElementById('r-email').value;
            const pass = document.getElementById('r-pass').value;

            if(!name || !email || !pass) return alert("Por favor, llena los campos básicos.");

            try {
                const cred = await auth.createUserWithEmailAndPassword(email, pass);
                await cred.user.updateProfile({
                    displayName: name,
                    photoURL: photo || "https://cdn-icons-png.flaticon.com"
                });
                alert("¡Cuenta creada correctamente!");
            } catch (err) { alert("Error: " + err.message); }
        }

        function handleLogin() {
            const email = document.getElementById('l-email').value;
            const pass = document.getElementById('l-pass').value;
            auth.signInWithEmailAndPassword(email, pass).catch(err => alert("Error: " + err.message));
        }

        function handleLogout() {
            auth.signOut().then(() => alert("Has cerrado la sesión."));
        }
    </script>
</body>
</html>
