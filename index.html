<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Futuralchat | Estilo WhatsApp</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <script src="https://unpkg.com"></script>
    <style>
        :root { --p: #6A0DAD; --lp: #E1BEE7; --bg: #f0f2f5; --w: #ffffff; --g: #54656f; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: #f0f2f5; height: 100vh; overflow: hidden; }

        .app-container { width: 100%; height: 100vh; display: flex; position: relative; background: var(--w); }

        /* VISTA DE LISTA (IZQUIERDA / MÓVIL) */
        .sidebar { 
            width: 100%; height: 100%; background: var(--w); 
            display: flex; flex-direction: column; z-index: 10;
            transition: transform 0.3s ease;
        }

        /* VISTA DE CHAT (DERECHA / MÓVIL) */
        .main-chat { 
            position: absolute; right: 0; top: 0; width: 100%; height: 100%; 
            background: #efeae2 url('https://user-images.githubusercontent.com');
            display: flex; flex-direction: column; transform: translateX(100%);
            transition: transform 0.3s ease; z-index: 20;
        }

        /* ESTADO ACTIVO (Para PC o cuando se abre un chat) */
        .show-chat .sidebar { transform: translateX(-30%); }
        .show-chat .main-chat { transform: translateX(0); }

        @media (min-width: 900px) {
            .sidebar { width: 30%; min-width: 350px; transform: none !important; position: relative; }
            .main-chat { width: 70%; position: relative; transform: none !important; }
            .back-btn { display: none !important; }
        }

        /* HEADERS */
        .header { background: #ededed; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        .my-id { background: var(--p); color: white; padding: 4px 10px; border-radius: 15px; font-size: 13px; font-weight: bold; }
        
        /* LISTA DE CHATS */
        .search-container { padding: 10px; background: #fff; }
        .search-bar { background: var(--bg); border-radius: 10px; display: flex; align-items: center; padding: 0 12px; }
        .search-bar input { border: none; background: transparent; padding: 10px; width: 100%; outline: none; }
        
        .chat-list { flex: 1; overflow-y: auto; }
        .contact { display: flex; padding: 14px; border-bottom: 1px solid #f2f2f2; cursor: pointer; align-items: center; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--p); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 15px; }

        /* BURBUJAS */
        .msg-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        .bubble { max-width: 75%; padding: 8px 12px; border-radius: 10px; font-size: 15px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); animation: msgPop 0.2s ease; position: relative; }
        @keyframes msgPop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .sent { align-self: flex-end; background: var(--lp); border-top-right-radius: 0; }
        .received { align-self: flex-start; background: white; border-top-left-radius: 0; }
        .time { font-size: 11px; color: #888; text-align: right; display: block; margin-top: 4px; }
        .bubble img { width: 100%; border-radius: 5px; margin-top: 5px; }

        /* FOOTER */
        .footer { background: #f0f2f5; padding: 10px; display: flex; align-items: center; gap: 10px; }
        .footer input { flex: 1; border: none; padding: 12px 18px; border-radius: 25px; outline: none; }
        .btn-icon { color: var(--p); font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container" id="app">
    <!-- PANEL DE LISTA -->
    <aside class="sidebar">
        <div class="header">
            <h3 style="color:var(--p)">Futuralchat</h3>
            <div class="my-id" onclick="copyMyID()">ID: <span id="myIDDisplay">...</span></div>
        </div>
        <div class="search-container">
            <div class="search-bar">
                <input type="number" id="targetID" placeholder="Buscar ID de amigo...">
                <i class="fas fa-plus-circle btn-icon" onclick="addNewUser()"></i>
            </div>
        </div>
        <div class="chat-list" id="contactList"></div>
    </aside>

    <!-- PANEL DE CONVERSACIÓN -->
    <main class="main-chat">
        <header class="header">
            <i class="fas fa-arrow-left btn-icon back-btn" onclick="closeChat()" style="margin-right:15px"></i>
            <div class="avatar" id="hAvatar" style="width:38px; height:38px; font-size:14px">?</div>
            <div style="flex:1; margin-left:12px">
                <h4 id="hName" style="font-size:16px">Usuario</h4>
                <span id="hStatus" style="font-size:12px; color:#25D366">En línea</span>
            </div>
            <label for="fileIn"><i class="fas fa-paperclip btn-icon"></i></label>
        </header>

        <div class="msg-box" id="msgBox"></div>

        <footer class="footer">
            <input type="file" id="fileIn" hidden accept="image/*" onchange="sendPhoto(this)">
            <input type="text" id="mInput" placeholder="Escribe un mensaje..." onkeypress="if(event.key==='Enter') sendText()">
            <i class="fas fa-paper-plane btn-icon" onclick="sendText()"></i>
        </footer>
    </main>
</div>

<script>
    let peer, db, activeChat = null, activeConn = null;
    const myID = localStorage.getItem('futural_id') || Math.floor(10000 + Math.random() * 90000);
    localStorage.setItem('futural_id', myID);
    document.getElementById('myIDDisplay').innerText = myID;

    // BASE DE DATOS LOCAL
    const request = indexedDB.open("FuturalDB_v3", 1);
    request.onupgradeneeded = e => {
        const d = e.target.result;
        d.createObjectStore("msgs", { keyPath: "id", autoIncrement: true });
        d.createObjectStore("users", { keyPath: "uid" });
    };
    request.onsuccess = e => { db = e.target.result; renderContacts(); };

    // INICIALIZAR P2P
    peer = new Peer(myID);
    peer.on('connection', conn => {
        handleIncomingConn(conn);
    });

    function handleIncomingConn(conn) {
        activeConn = conn;
        saveUser(conn.peer);
        conn.on('data', data => {
            saveMsg({ chat: conn.peer, ...data, sender: 'other' });
        });
    }

    // FUNCIONES DE INTERFAZ
    function addNewUser() {
        const id = document.getElementById('targetID').value.trim();
        if(!id || id == myID) return;
        saveUser(id);
        openChat(id);
        document.getElementById('targetID').value = "";
    }

    function openChat(id) {
        activeChat = id;
        document.getElementById('app').classList.add('show-chat');
        document.getElementById('hName').innerText = "ID: " + id;
        document.getElementById('hAvatar').innerText = id.toString().substring(0,2);
        
        // Conectar P2P
        activeConn = peer.connect(id);
        handleIncomingConn(activeConn);
        
        renderMessages();
    }

    function closeChat() {
        document.getElementById('app').classList.remove('show-chat');
        activeChat = null;
    }

    function saveUser(uid) {
        const tx = db.transaction("users", "readwrite");
        tx.objectStore("users").put({ uid: uid });
        tx.oncomplete = () => renderContacts();
    }

    function sendText() {
        const val = document.getElementById('mInput').value;
        if(!val || !activeChat) return;
        const data = { type: 'text', content: val };
        if(activeConn) activeConn.send(data);
        saveMsg({ chat: activeChat, ...data, sender: 'me' });
        document.getElementById('mInput').value = "";
    }

    function sendPhoto(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = e => {
            const data = { type: 'img', content: e.target.result };
            if(activeConn) activeConn.send(data);
            saveMsg({ chat: activeChat, ...data, sender: 'me' });
        };
        reader.readAsDataURL(file);
    }

    function saveMsg(msg) {
        msg.time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        const tx = db.transaction("msgs", "readwrite");
        tx.objectStore("msgs").add(msg);
        tx.oncomplete = () => { if(activeChat) renderMessages(); };
    }

    function renderContacts() {
        const list = document.getElementById('contactList');
        list.innerHTML = "";
        db.transaction("users").objectStore("users").getAll().onsuccess = e => {
            e.target.result.forEach(u => {
                const d = document.createElement('div');
                d.className = 'contact';
                d.onclick = () => openChat(u.uid);
                d.innerHTML = `<div class="avatar">${u.uid.toString().substring(0,2)}</div><div><h4>ID: ${u.uid}</h4><p>Toca para chatear</p></div>`;
                list.appendChild(d);
            });
        };
    }

    function renderMessages() {
        const box = document.getElementById('msgBox');
        box.innerHTML = "";
        db.transaction("msgs").objectStore("msgs").getAll().onsuccess = e => {
            e.target.result.filter(m => m.chat == activeChat).forEach(m => {
                const d = document.createElement('div');
                d.className = `bubble ${m.sender === 'me' ? 'sent' : 'received'}`;
                if(m.type === 'text') d.innerText = m.content;
                else d.innerHTML = `<img src="${m.content}">`;
                d.innerHTML += `<span class="time">${m.time}</span>`;
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        };
    }

    function copyMyID() {
        navigator.clipboard.writeText(myID);
        alert("ID Copiado");
    }
</script>
</body>
</html>
