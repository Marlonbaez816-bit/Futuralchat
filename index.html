<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuralchat - Firebase Edition</title>
    <style>
        /* Diseño oscuro y moderno */
        body { font-family: 'Segoe UI', sans-serif; background: #0b141a; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #202c33; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2em; border-bottom: 1px solid #374045; color: #00a884; }
        
        #contenedor-chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com'); /* Fondo tipo WhatsApp */ background-attachment: fixed; }
        
        .burbuja { background: #202c33; padding: 10px 15px; border-radius: 10px; max-width: 80%; width: fit-content; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .burbuja b { display: block; color: #00a884; font-size: 0.85em; margin-bottom: 4px; }
        
        .area-entrada { background: #202c33; padding: 10px; display: flex; gap: 10px; align-items: center; }
        input { flex: 1; background: #2a3942; border: none; padding: 12px; border-radius: 20px; color: white; outline: none; font-size: 1em; }
        button { background: #00a884; color: #0b141a; border: none; width: 45px; height: 45px; border-radius: 50%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <header>FUTURALCHAT</header>

    <div id="contenedor-chat">
        <!-- Los mensajes aparecerán aquí automáticamente -->
    </div>

    <div class="area-entrada">
        <input type="text" id="mensaje-input" placeholder="Escribe un mensaje..." autocomplete="off">
        <button onclick="enviarMensaje()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M1.101 21.757L23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"></path></svg>
        </button>
    </div>

    <!-- CONEXIÓN A FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com";

        // Tu configuración de la imagen
        const firebaseConfig = {
            apiKey: "AIzaSyBViXmpHDthxQog-p79Bv9TwSCS1EYbjPU",
            authDomain: "futuralchat.firebaseapp.com",
            projectId: "futuralchat",
            storageBucket: "futuralchat.firebasestorage.app",
            messagingSenderId: "888367297347",
            appId: "1:888367297347:web:a4eba58b25edfdf5b5876f6",
            measurementId: "G-7WHRFHR9NW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- FUNCIÓN PARA ENVIAR ---
        window.enviarMensaje = async () => {
            const input = document.getElementById("mensaje-input");
            const texto = input.value.trim();
            
            if (texto !== "") {
                try {
                    await addDoc(collection(db, "mensajes"), {
                        usuario: "Invitado",
                        mensaje: texto,
                        hora: serverTimestamp()
                    });
                    input.value = ""; // Limpia el cuadro
                } catch (e) {
                    console.error("Error al enviar: ", e);
                }
            }
        };

        // Escuchar la tecla "Enter" para enviar
        document.getElementById("mensaje-input").addEventListener("keypress", (e) => {
            if (e.key === "Enter") enviarMensaje();
        });

        // --- FUNCIÓN PARA LEER (TIEMPO REAL) ---
        const q = query(collection(db, "mensajes"), orderBy("hora", "asc"));
        onSnapshot(q, (snapshot) => {
            const chatDiv = document.getElementById("contenedor-chat");
            chatDiv.innerHTML = ""; // Limpiar antes de actualizar
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                const div = document.createElement("div");
                div.className = "burbuja";
                div.innerHTML = `<b>${data.usuario}</b> ${data.mensaje}`;
                chatDiv.appendChild(div);
            });
            
            // Auto-scroll al último mensaje
            chatDiv.scrollTop = chatDiv.scrollHeight;
        });
    </script>
</body>
</html>
