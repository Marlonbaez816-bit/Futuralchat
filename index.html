<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Futuralchat - Glass Edition</title>
    
    <!-- SDKs de Firebase (Carga Prioritaria) -->
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>

    <style>
        /* ESTILO IPDROP (Glassmorphism) */
        :root {
            --glass: rgba(255, 255, 255, 0.12);
            --border: rgba(255, 255, 255, 0.2);
            --accent: #4ecca3;
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, sans-serif;
            background: radial-gradient(circle at top right, #1b262c, #0f172a);
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            color: white; overflow: hidden;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 25px;
            width: 85%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
        }

        /* CARTELITO VERIFICADO */
        .verified-badge {
            background: #0084ff;
            color: white;
            font-size: 10px;
            font-weight: 800;
            padding: 5px 15px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            margin-bottom: 20px;
            padding: 4px;
        }

        .tab-btn {
            flex: 1; padding: 10px; border: none;
            background: transparent; color: #94a3b8;
            font-weight: 600; border-radius: 10px;
            cursor: pointer;
        }

        .tab-btn.active {
            background: var(--accent);
            color: #0f172a;
        }

        input {
            width: 100%; box-sizing: border-box;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            padding: 14px; margin: 8px 0;
            border-radius: 14px; color: white;
            font-size: 16px; outline: none;
        }

        .main-btn {
            width: 100%; padding: 15px;
            background: var(--accent); color: #0f172a;
            border: none; border-radius: 14px;
            font-weight: bold; font-size: 16px;
            margin-top: 15px; cursor: pointer;
        }

        .avatar {
            width: 90px; height: 90px;
            border-radius: 50%; border: 4px solid var(--accent);
            object-fit: cover; margin-bottom: 12px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="verified-badge">✓ Verificado</div>

        <!-- SECCIÓN LOGIN / REGISTRO -->
        <div id="section-auth">
            <div class="tabs">
                <button id="t-login" class="tab-btn active">Entrar</button>
                <button id="t-reg" class="tab-btn">Registro</button>
            </div>

            <div id="form-login">
                <input type="email" id="l-email" placeholder="Correo electrónico">
                <input type="password" id="l-pass" placeholder="Contraseña">
                <button id="btn-login-action" class="main-btn">Iniciar Sesión</button>
            </div>

            <div id="form-reg" class="hidden">
                <input type="text" id="r-name" placeholder="Nombre completo">
                <input type="text" id="r-photo" placeholder="Link de foto (Avatar)">
                <input type="email" id="r-email" placeholder="Correo">
                <input type="password" id="r-pass" placeholder="Contraseña">
                <button id="btn-reg-action" class="main-btn">Crear Cuenta</button>
            </div>
        </div>

        <!-- SECCIÓN USUARIO (PERSISTENTE) -->
        <div id="section-user" class="hidden">
            <img id="u-avatar" src="" class="avatar">
            <h3 id="u-name" style="margin: 5px 0;"></h3>
            <p style="font-size: 12px; color: #4ecca3; margin-bottom: 20px;">Sesión Activa</p>
            <button id="btn-logout" class="main-btn" style="background: #ef4444; color: white;">Cerrar Sesión</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBVlXapbDchsQog-d79Bv9Tw",
            authDomain: "futuralchat.firebaseapp.com",
            projectId: "futuralchat",
            storageBucket: "futuralchat.firebasestorage.app",
            messagingSenderId: "888367297347",
            appId: "1:888367297347:web:s4abe58b20ec9e11516086"
        };

        // Inicialización segura
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // PERSISTENCIA: Control de sesión automática
        auth.onAuthStateChanged((user) => {
            const sAuth = document.getElementById('section-auth');
            const sUser = document.getElementById('section-user');
            if (user) {
                sAuth.classList.add('hidden');
                sUser.classList.remove('hidden');
                document.getElementById('u-name').innerText = user.displayName || "Usuario";
                document.getElementById('u-avatar').src = user.photoURL || "https://cdn-icons-png.flaticon.com";
            } else {
                sAuth.classList.remove('hidden');
                sUser.classList.add('hidden');
            }
        });

        // FUNCIONES ASIGNADAS DESPUÉS DE CARGAR (Para evitar error 'auth')
        document.getElementById('t-login').onclick = () => switchTab('login');
        document.getElementById('t-reg').onclick = () => switchTab('reg');

        function switchTab(mode) {
            const isLogin = mode === 'login';
            document.getElementById('form-login').classList.toggle('hidden', !isLogin);
            document.getElementById('form-reg').classList.toggle('hidden', isLogin);
            document.getElementById('t-login').classList.toggle('active', isLogin);
            document.getElementById('t-reg').classList.toggle('active', !isLogin);
        }

        document.getElementById('btn-reg-action').onclick = async () => {
            const n = document.getElementById('r-name').value;
            const ph = document.getElementById('r-photo').value;
            const e = document.getElementById('r-email').value;
            const p = document.getElementById('r-pass').value;
            try {
                const res = await auth.createUserWithEmailAndPassword(e, p);
                await res.user.updateProfile({ displayName: n, photoURL: ph });
                alert("¡Cuenta creada!");
            } catch (err) { alert(err.message); }
        };

        document.getElementById('btn-login-action').onclick = () => {
            const e = document.getElementById('l-email').value;
            const p = document.getElementById('l-pass').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
        };

        document.getElementById('btn-logout').onclick = () => {
            auth.signOut().then(() => alert("Sesión terminada"));
        };
    </script>
</body>
</html>
