<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat Security</title>
    <style>
        /* Paleta de Colores: Blanco y Púrpura */
        :root {
            --bg-principal: #ffffff;
            --purpura-apple: #a370f7; /* Púrpura vibrante */
            --purpura-suave: #f3ebff;
            --texto: #1d1d1f;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-principal); 
            color: var(--texto); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            overflow: hidden;
        }

        header { 
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px; 
            text-align: center; 
            color: var(--purpura-apple);
            font-weight: 700;
            font-size: 1.1em;
            letter-spacing: 1px;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        #pantalla-chat { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            scroll-behavior: smooth;
        }

        /* --- ANIMACIÓN ESTILO AIRDROP --- */
        @keyframes airdropIn {
            0% { opacity: 0; transform: scale(0.5) translateY(20px); }
            70% { transform: scale(1.05) translateY(-2px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .burbuja {
            padding: 12px 18px;
            border-radius: 20px;
            max-width: 75%;
            font-size: 0.95em;
            line-height: 1.4;
            position: relative;
            animation: airdropIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Efecto rebote */
            word-wrap: break-word;
            box-shadow: 0 4px 15px rgba(163, 112, 247, 0.1);
        }

        /* Mensaje recibido (Blanco/Gris suave) */
        .recibido {
            background: #f2f2f7;
            align-self: flex-start;
            color: #000;
            border-bottom-left-radius: 5px;
        }

        /* Mensaje enviado (Púrpura) */
        .enviado {
            background: var(--purpura-apple);
            align-self: flex-end;
            color: white;
            border-bottom-right-radius: 5px;
        }

        .burbuja b {
            display: block;
            font-size: 0.7em;
            margin-bottom: 4px;
            opacity: 0.8;
            text-transform: uppercase;
        }

        .area-entrada { 
            padding: 20px; 
            display: flex; 
            gap: 12px; 
            background: white;
            border-top: 1px solid #f0f0f0;
        }

        input { 
            flex: 1; 
            padding: 14px 20px; 
            border: 1.5px solid #eee; 
            border-radius: 30px; 
            outline: none; 
            transition: border 0.3s;
            font-size: 1em;
        }

        input:focus { border-color: var(--purpura-apple); }

        button { 
            background: var(--purpura-apple); 
            color: white; 
            border: none; 
            padding: 0 25px; 
            border-radius: 30px; 
            cursor: pointer; 
            font-weight: 600;
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <header>PRIVATE CHAT SECURITY</header>

    <div id="pantalla-chat"></div>

    <div class="area-entrada">
        <input type="text" id="mensaje-input" placeholder="Escribe un mensaje seguro..." autocomplete="off">
        <button onclick="enviar()">Enviar</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyBViXmpHDthxQog-p79Bv9TwSCS1EYbjPU",
            authDomain: "futuralchat.firebaseapp.com",
            projectId: "futuralchat",
            storageBucket: "futuralchat.firebasestorage.app",
            messagingSenderId: "888367297347",
            appId: "1:888367297347:web:a4eba58b25edfdf5b5876f6",
            measurementId: "G-7WHRFHR9NW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Identificación de sesión personal (Nombre único por teléfono)
        let miNombre = localStorage.getItem("user_nick");
        if (!miNombre) {
            miNombre = prompt("Tu nombre para Private Chat:") || "Agente";
            localStorage.setItem("user_nick", miNombre);
        }

        // --- ENVIAR ---
        window.enviar = async () => {
            const input = document.getElementById("mensaje-input");
            if (input.value.trim() === "") return;

            try {
                await addDoc(collection(db, "mensajes_seguros"), {
                    user: miNombre,
                    msg: input.value,
                    time: serverTimestamp()
                });
                input.value = "";
            } catch (e) { console.error(e); }
        };

        // --- RECIBIR Y ANIMAR ---
        const q = query(collection(db, "mensajes_seguros"), orderBy("time", "asc"));
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById("pantalla-chat");
            container.innerHTML = "";
            snapshot.forEach((doc) => {
                const d = doc.data();
                const div = document.createElement("div");
                
                // Si el nombre es el mío, burbuja púrpura a la derecha. Si no, gris a la izquierda.
                const esMio = d.user === miNombre;
                div.className = `burbuja ${esMio ? 'enviado' : 'recibido'}`;
                
                div.innerHTML = `<b>${d.user}</b>${d.msg}`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        });
    </script>
</body>
</html>
