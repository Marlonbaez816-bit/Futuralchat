<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FuturalChat</title>
    <style>
        body { margin: 0; background: #000; font-family: -apple-system, sans-serif; color: white; padding: 20px; text-align: center; }
        .glass { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); 
            margin-top: 20px;
        }
        .btn { background: #007aff; border: none; color: white; padding: 15px; border-radius: 15px; width: 100%; font-weight: bold; margin-top: 15px; font-size: 16px; }
        input { width: 100%; background: rgba(255,255,255,0.1); border: none; color: white; padding: 15px; border-radius: 15px; box-sizing: border-box; margin-top: 10px; }
        #chat { height: 200px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 15px; margin: 15px 0; padding: 10px; text-align: left; }
    </style>
</head>
<body>

    <h1 style="color: #007aff;">FUTURALCHAT</h1>

    <div class="glass">
        <p>Tu ID: <span id="mi-id" style="font-weight:bold;">---</span></p>
        <button class="btn" onclick="iniciarConexion()">1. Generar Llave</button>
        <button class="btn" style="background:#34c759;" onclick="pegarLlave()">2. Pegar Llave</button>
    </div>

    <div id="chat">
        <p style="color:#666;">Esperando conexión...</p>
    </div>

    <div class="glass">
        <input type="text" id="msj" placeholder="Escribe un mensaje...">
        <button class="btn" onclick="enviar()">Enviar 🚀</button>
    </div>

    <script>
        // Lógica simplificada para asegurar carga
        try {
            if(!localStorage.getItem('myID')) {
                localStorage.setItem('myID', Math.floor(10000 + Math.random() * 90000));
            }
            document.getElementById('mi-id').innerText = localStorage.getItem('myID');
        } catch(e) {
            alert("Error al cargar ID: " + e);
        }

        function iniciarConexion() {
            alert("Generando llave... (Aquí irá la lógica P2P)");
        }

        function pegarLlave() {
            let llave = prompt("Pega la llave de tu amigo:");
            if(llave) alert("Conectando...");
        }

        function enviar() {
            let texto = document.getElementById('msj').value;
            if(texto) {
                let p = document.createElement('p');
                p.innerText = "Tú: " + texto;
                document.getElementById('chat').appendChild(p);
                document.getElementById('msj').value = "";
            }
        }
    </script>
</body>
</html>
